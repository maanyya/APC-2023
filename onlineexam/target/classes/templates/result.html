<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Results</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f39c12;
            animation: confetti-fall 3s linear infinite;
        }
        
        .confetti:nth-child(1) { left: 10%; animation-delay: 0s; background: #e74c3c; }
        .confetti:nth-child(2) { left: 20%; animation-delay: 0.5s; background: #3498db; }
        .confetti:nth-child(3) { left: 30%; animation-delay: 1s; background: #2ecc71; }
        .confetti:nth-child(4) { left: 40%; animation-delay: 1.5s; background: #f39c12; }
        .confetti:nth-child(5) { left: 50%; animation-delay: 2s; background: #9b59b6; }
        .confetti:nth-child(6) { left: 60%; animation-delay: 2.5s; background: #e67e22; }
        .confetti:nth-child(7) { left: 70%; animation-delay: 3s; background: #1abc9c; }
        .confetti:nth-child(8) { left: 80%; animation-delay: 3.5s; background: #e91e63; }
        .confetti:nth-child(9) { left: 90%; animation-delay: 4s; background: #795548; }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
        
        .results-container {
            max-width: 700px;
            width: 100%;
            animation: resultsEntrance 1s ease-out;
        }
        
        @keyframes resultsEntrance {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        
        .results-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .results-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .results-content {
            position: relative;
            z-index: 2;
        }
        
        .result-header {
            margin-bottom: 40px;
        }
        
        .result-header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .result-header h2 {
            color: #555;
            font-size: 1.5em;
            font-weight: 400;
        }
        
        .username {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 600;
        }
        
        .score-section {
            margin: 50px 0;
        }
        
        .score-display {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 30px;
            font-weight: 500;
        }
        
        .score-visual {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 30px 0;
        }
        
        .score-circle {
            position: relative;
            width: 200px;
            height: 200px;
        }
        
        .circle-bg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #e9ecef 0deg, #e9ecef var(--percentage), #e9ecef var(--percentage), #e9ecef 360deg);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: circleRotate 2s ease-out;
        }
        
        @keyframes circleRotate {
            from { transform: rotate(-90deg); }
            to { transform: rotate(0deg); }
        }
        
        .circle-inner {
            width: 80%;
            height: 80%;
            background: white;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: inset 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .percentage-text {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
            animation: countUp 2s ease-out;
        }
        
        @keyframes countUp {
            from { opacity: 0; transform: scale(0.5); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .percentage-label {
            font-size: 1.1em;
            color: #666;
            font-weight: 500;
        }
        
        .grade-section {
            margin: 40px 0;
        }
        
        .grade {
            padding: 30px;
            border-radius: 20px;
            margin: 25px 0;
            font-size: 1.5em;
            font-weight: 600;
            position: relative;
            overflow: hidden;
            animation: gradeSlideIn 0.8s ease-out;
        }
        
        @keyframes gradeSlideIn {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .grade::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: gradeShine 3s ease-in-out infinite;
        }
        
        @keyframes gradeShine {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }
        
        .grade-excellent {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
        }
        
        .grade-good {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 10px 30px rgba(52, 152, 219, 0.3);
        }
        
        .grade-average {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            box-shadow: 0 10px 30px rgba(243, 156, 18, 0.3);
        }
        
        .grade-poor {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }
        
        .actions {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        
        .action-btn {
            padding: 18px 35px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .action-btn:hover::before {
            left: 100%;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .stat-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.2);
            animation: statCardFadeIn 1s ease-out;
        }
        
        @keyframes statCardFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            display: block;
        }
        
        .stat-label {
            font-size: 1em;
            color: #666;
            margin-top: 5px;
        }
        
        @media (max-width: 768px) {
            .results-card {
                padding: 30px 25px;
                border-radius: 20px;
            }
            
            .result-header h1 {
                font-size: 2.2em;
            }
            
            .score-circle {
                width: 150px;
                height: 150px;
            }
            
            .percentage-text {
                font-size: 2.2em;
            }
            
            .actions {
                flex-direction: column;
                align-items: center;
            }
            
            .action-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Confetti Animation for High Scores -->
    <div th:if="${percentage >= 85}" class="confetti-container">
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
    </div>

    <div class="results-container">
        <div class="results-card">
            <div class="results-content">
                <div class="result-header">
                    <h1><i class="fas fa-trophy"></i> Exam Completed!</h1>
                    <h2>Results for <span class="username" th:text="${username}">User</span></h2>
                </div>

                <div class="score-section">
                    <div class="score-display">
                        <i class="fas fa-chart-line"></i> Your Score: <strong th:text="${score}">12</strong> out of <strong th:text="${totalQuestions}">15</strong>
                    </div>
                    
                    <div class="score-visual">
                        <div class="score-circle">
                            <div class="circle-bg" th:style="'--percentage: ' + ${percentage * 3.6} + 'deg'">
                                <div class="circle-inner">
                                    <div class="percentage-text" th:text="${percentageFormatted}" 
                                         th:style="'color: ' + (${percentage >= 90} ? '#2ecc71' : (${percentage >= 80} ? '#3498db' : (${percentage >= 60} ? '#f39c12' : '#e74c3c')))">80.0</div>
                                    <div class="percentage-label">Percentage</div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="stats-grid">
                        <div class="stat-card">
                            <span class="stat-number" th:text="${score}">12</span>
                            <div class="stat-label">Correct Answers</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" th:text="${totalQuestions - score}">3</span>
                            <div class="stat-label">Incorrect</div>
                        </div>
                        <div class="stat-card">
                            <span class="stat-number" th:text="${totalQuestions}">15</span>
                            <div class="stat-label">Total Questions</div>
                        </div>
                    </div>
                </div>
                
                <div class="grade-section">
                    <!-- Grade Display with Amazing Animations -->
                    <div th:if="${percentage >= 90}" class="grade grade-excellent">
                        <i class="fas fa-star"></i> OUTSTANDING! Perfect Performance! <i class="fas fa-star"></i>
                    </div>
                    <div th:if="${percentage >= 80 and percentage < 90}" class="grade grade-good">
                        <i class="fas fa-thumbs-up"></i> EXCELLENT WORK! Well Done! <i class="fas fa-medal"></i>
                    </div>
                    <div th:if="${percentage >= 60 and percentage < 80}" class="grade grade-average">
                        <i class="fas fa-check-circle"></i> GOOD JOB! Keep Practicing! <i class="fas fa-arrow-up"></i>
                    </div>
                    <div th:if="${percentage < 60}" class="grade grade-poor">
                        <i class="fas fa-book"></i> KEEP LEARNING! Try Again! <i class="fas fa-redo"></i>
                    </div>
                </div>
                
                <div class="actions">
                    <a th:href="@{/exam}" class="action-btn btn-primary">
                        <i class="fas fa-redo"></i> Take Another Exam
                    </a>
                    <a th:href="@{/leaderboard}" class="action-btn btn-success">
                        <i class="fas fa-trophy"></i> View Leaderboard
                    </a>
                    <a th:href="@{/logout}" class="action-btn btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Confetti effect for high scores
        if (parseFloat("[[${percentage}]]") >= 90) {
            // Simple confetti effect
            setTimeout(() => {
                alert("🎉 Congratulations on your excellent performance! 🎉");
            }, 1000);
        }
    </script>
</body>
</html>
