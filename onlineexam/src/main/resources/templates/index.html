<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Exam System</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -1;
        }
        
        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }
        
        .shape:nth-child(1) {
            top: 10%;
            left: 10%;
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            animation-delay: 0s;
        }
        
        .shape:nth-child(2) {
            top: 70%;
            right: 10%;
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            animation-delay: 2s;
        }
        
        .shape:nth-child(3) {
            top: 40%;
            left: 80%;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            animation-delay: 4s;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(180deg); }
        }
        
        .main-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            max-width: 900px;
            width: 100%;
            animation: slideUp 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 50px 40px;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header-content {
            position: relative;
            z-index: 2;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 15px;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .header p {
            opacity: 0.9;
            font-size: 1.2em;
            margin-bottom: 20px;
        }
        
        .header i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.8;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .container { 
            padding: 40px;
        }
        
        .tabs { 
            display: flex; 
            margin-bottom: 30px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            background: #f8f9fa;
        }
        
        .tab { 
            flex: 1; 
            padding: 18px; 
            background: transparent;
            cursor: pointer; 
            border: none; 
            font-size: 16px;
            font-weight: 600;
            transition: all 0.4s ease;
            position: relative;
            color: #666;
        }
        
        .tab:hover {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }
        
        .tab.active { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        
        .tab-content { 
            display: none;
            animation: fadeInUp 0.6s ease-out;
        }
        
        .tab-content.active { 
            display: block; 
        }
        
        @keyframes fadeInUp {
            from { 
                opacity: 0; 
                transform: translateY(30px);
            }
            to { 
                opacity: 1; 
                transform: translateY(0);
            }
        }
        
        .form-section h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-weight: 600;
            font-size: 1.8em;
        }
        
        .form-group { 
            margin: 25px 0;
            position: relative;
        }
        
        label { 
            display: block; 
            margin-bottom: 10px; 
            font-weight: 600;
            color: #555;
            font-size: 15px;
        }
        
        .input-container {
            position: relative;
        }
        
        .input-container i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
        }
        
        input { 
            width: 100%; 
            padding: 18px 20px 18px 55px;
            border: 2px solid #e1e5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        
        input:focus + i {
            color: #667eea;
        }
        
        button { 
            width: 100%; 
            padding: 18px;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; 
            border: none; 
            border-radius: 12px;
            cursor: pointer; 
            font-size: 17px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-top: 15px;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }
        
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        button:hover::before {
            left: 100%;
        }
        
        button:hover { 
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }
        
        button:active {
            transform: translateY(-1px);
        }
        
        .message { 
            padding: 18px 25px;
            margin: 25px 0;
            border-radius: 12px;
            font-weight: 500;
            animation: slideInRight 0.5s ease-out;
            border-left: 4px solid;
        }
        
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .alert-error { 
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.1), rgba(238, 90, 82, 0.1));
            color: #d32f2f;
            border-left-color: #d32f2f;
        }
        
        .alert-success { 
            background: linear-gradient(135deg, rgba(81, 207, 102, 0.1), rgba(64, 192, 87, 0.1));
            color: #2e7d32;
            border-left-color: #2e7d32;
        }
        
        .quick-demo {
            margin-top: 30px;
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1), rgba(118, 75, 162, 0.1));
            border-radius: 12px;
            font-size: 14px;
            color: #666;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }
        
        .quick-demo strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }
        
        .leaderboard-preview {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .leaderboard-preview h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
            font-size: 1.8em;
        }
        
        .load-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin-bottom: 20px;
        }
        
        .load-btn:hover {
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        
        #leaderboard-content {
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-style: italic;
        }
        
        @media (max-width: 520px) {
            .main-container {
                margin: 10px;
                border-radius: 20px;
            }
            
            .header {
                padding: 35px 25px;
            }
            
            .container {
                padding: 30px 25px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .header p {
                font-size: 1em;
            }
            
            .tabs {
                flex-direction: column;
            }
            
            .tab {
                border-radius: 0;
            }
            
            .tab.active {
                transform: translateY(0) translateX(-3px);
            }
        }
    </style>
</head>
<body>
    <div class="background-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <div class="main-container">
        <div class="header">
            <div class="header-content">
                <i class="fas fa-graduation-cap"></i>
                <h1>Online Exam System</h1>
                <p>Master your knowledge with our comprehensive testing platform</p>
            </div>
        </div>

        <div class="container">
            <!-- Alert Messages -->
            <div th:if="${success}" class="message alert-success" th:text="${success}"></div>
            <div th:if="${error}" class="message alert-error" th:text="${error}"></div>

            <!-- Tab Navigation -->
            <div class="tabs">
                <button class="tab active" onclick="showTab('login', this)">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab" onclick="showTab('register', this)">
                    <i class="fas fa-user-plus"></i> Register
                </button>
                <button class="tab" onclick="showTab('leaderboard', this)">
                    <i class="fas fa-trophy"></i> Leaderboard
                </button>
            </div>

            <!-- Login Tab -->
            <div id="login" class="tab-content active">
                <div class="form-section">
                    <h2><i class="fas fa-key"></i> Welcome Back</h2>
                    <form th:action="@{/login}" method="post">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Username</label>
                            <div class="input-container">
                                <input type="text" name="username" placeholder="Enter your username" required>
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Password</label>
                            <div class="input-container">
                                <input type="password" name="password" placeholder="Enter your password" required>
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>
                        <button type="submit">
                            <i class="fas fa-rocket"></i> Login & Start Exam
                        </button>
                    </form>

                    <div class="quick-demo">
                        <strong><i class="fas fa-info-circle"></i> Quick Demo</strong>
                        Try with username: <strong>testuser</strong> and password: <strong>testpass</strong>
                    </div>
                </div>
            </div>

            <!-- Register Tab -->
            <div id="register" class="tab-content">
                <div class="form-section">
                    <h2><i class="fas fa-user-plus"></i> Join Us Today</h2>
                    <form th:action="@{/register}" method="post">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Choose Username</label>
                            <div class="input-container">
                                <input type="text" name="username" placeholder="Create a unique username" required>
                                <i class="fas fa-user"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Create Password</label>
                            <div class="input-container">
                                <input type="password" name="password" placeholder="Choose a strong password" required>
                                <i class="fas fa-lock"></i>
                            </div>
                        </div>
                        <button type="submit">
                            <i class="fas fa-check-circle"></i> Create Account
                        </button>
                    </form>
                </div>
            </div>

            <!-- Leaderboard Tab -->
            <div id="leaderboard" class="tab-content">
                <div class="leaderboard-preview">
                    <h2><i class="fas fa-trophy"></i> Top Performers</h2>
                    <button class="load-btn" onclick="loadLeaderboard()">
                        <i class="fas fa-refresh"></i> Load Leaderboard
                    </button>
                    <div id="leaderboard-content">
                        <i class="fas fa-chart-line fa-2x"></i><br>
                        Click above to view rankings
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showTab(tabName, element) {
            // Hide all tab contents
            var contents = document.getElementsByClassName('tab-content');
            for (var i = 0; i < contents.length; i++) {
                contents[i].classList.remove('active');
            }
            
            // Remove active class from all tabs
            var tabs = document.getElementsByClassName('tab');
            for (var i = 0; i < tabs.length; i++) {
                tabs[i].classList.remove('active');
            }
            
            // Show selected tab and activate button
            document.getElementById(tabName).classList.add('active');
            element.classList.add('active');
        }

        function loadLeaderboard() {
            const content = document.getElementById('leaderboard-content');
            content.innerHTML = '<i class="fas fa-spinner fa-spin fa-2x"></i><br>Loading...';
            
            fetch('/leaderboard')
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const leaderboardTable = doc.querySelector('table');
                    if (leaderboardTable) {
                        // Add some styling to the table
                        leaderboardTable.style.width = '100%';
                        leaderboardTable.style.borderCollapse = 'collapse';
                        leaderboardTable.style.marginTop = '10px';
                        
                        const rows = leaderboardTable.querySelectorAll('tr');
                        rows.forEach((row, index) => {
                            if (index === 0) {
                                row.style.background = '#667eea';
                                row.style.color = 'white';
                            } else {
                                row.style.background = index % 2 === 0 ? '#f8f9fa' : 'white';
                            }
                            const cells = row.querySelectorAll('td, th');
                            cells.forEach(cell => {
                                cell.style.padding = '12px';
                                cell.style.textAlign = 'center';
                                cell.style.border = '1px solid #dee2e6';
                            });
                        });
                        
                        content.innerHTML = leaderboardTable.outerHTML;
                    } else {
                        content.innerHTML = '<i class="fas fa-exclamation-triangle"></i><br>No data available';
                    }
                })
                .catch(error => {
                    content.innerHTML = '<i class="fas fa-exclamation-triangle"></i><br>Error loading leaderboard';
                });
        }

        // Add some entrance animations
        document.addEventListener('DOMContentLoaded', function() {
            const shapes = document.querySelectorAll('.shape');
            shapes.forEach((shape, index) => {
                shape.style.animationDelay = `${index * 2}s`;
            });
        });
    </script>
</body>
</html>
