<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
            --warning-gradient: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
            --danger-gradient: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            --gold-gradient: linear-gradient(135deg, #f7dc6f 0%, #f4d03f 100%);
            --silver-gradient: linear-gradient(135deg, #d5dbdb 0%, #aeb6bf 100%);
            --bronze-gradient: linear-gradient(135deg, #e8bc8a 0%, #cd853f 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --dark-text: #2c3e50;
            --light-text: #ecf0f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Animated Background Elements */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            z-index: -1;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-50px, -50px) rotate(360deg); }
        }

        .leaderboard-container {
            max-width: 1000px;
            width: 100%;
            animation: resultsEntrance 1s ease-out;
        }
        
        @keyframes resultsEntrance {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(50px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .leaderboard-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .leaderboard-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .leaderboard-content {
            position: relative;
            z-index: 2;
        }
        
        .header {
            margin-bottom: 40px;
        }

        @keyframes slideInDown {
            from {
                transform: translateY(-100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            animation: titlePulse 2s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        .header h2 {
            color: #34495e;
            font-size: 1.5em;
            font-weight: 500;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
        }

        .leaderboard-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            animation: slideInUp 0.8s ease-out 0.3s both;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .table-container {
            overflow-x: auto;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            overflow: hidden;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        th {
            background: var(--primary-gradient);
            color: white;
            font-weight: 600;
            padding: 1.5rem 1rem;
            text-align: left;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            position: relative;
        }

        th::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        td {
            padding: 1.2rem 1rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
        }

        tr {
            transition: all 0.3s ease;
            position: relative;
        }

        tr:hover {
            background: rgba(103, 126, 234, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        /* Enhanced Rank Styling */
        .rank-1 {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 193, 7, 0.1));
            border-left: 5px solid #ffd700;
            animation: goldGlow 2s ease-in-out infinite alternate;
        }

        .rank-2 {
            background: linear-gradient(135deg, rgba(192, 192, 192, 0.2), rgba(169, 169, 169, 0.1));
            border-left: 5px solid #c0c0c0;
        }

        .rank-3 {
            background: linear-gradient(135deg, rgba(205, 127, 50, 0.2), rgba(160, 82, 45, 0.1));
            border-left: 5px solid #cd853f;
        }

        @keyframes goldGlow {
            from { box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            to { box-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
        }

        .rank-position {
            font-weight: bold;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .rank-1 .rank-position {
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        .rank-2 .rank-position {
            color: #c0c0c0;
        }

        .rank-3 .rank-position {
            color: #cd853f;
        }

        .username {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--dark-text);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .score-cell {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--dark-text);
        }

        .percentage-badge {
            padding: 0.4rem 0.8rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-block;
            animation: bounceIn 0.6s ease-out;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        .percentage-high {
            background: var(--success-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }

        .percentage-medium {
            background: var(--warning-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3);
        }

        .percentage-low {
            background: var(--danger-gradient);
            color: white;
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.3);
        }

        .date-cell {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--light-text);
            animation: fadeIn 1s ease-out;
        }

        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.6;
        }

        .empty-state p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .action-buttons {
            margin-top: 50px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 18px 35px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1.1em;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            min-width: 180px;
            justify-content: center;
            position: relative;
            overflow: hidden;
            margin: 0.5rem;
        }

        .action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .action-btn:hover::before {
            left: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #6c757d, #5a6268);
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .action-btn i {
            margin-right: 0.5rem;
        }

        /* Animation removed */

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f39c12;
            animation: confetti-fall 3s linear infinite;
        }
        
        .confetti:nth-child(1) { left: 10%; animation-delay: 0s; background: #e74c3c; }
        .confetti:nth-child(2) { left: 20%; animation-delay: 0.5s; background: #3498db; }
        .confetti:nth-child(3) { left: 30%; animation-delay: 1s; background: #2ecc71; }
        .confetti:nth-child(4) { left: 40%; animation-delay: 1.5s; background: #f39c12; }
        .confetti:nth-child(5) { left: 50%; animation-delay: 2s; background: #9b59b6; }
        .confetti:nth-child(6) { left: 60%; animation-delay: 2.5s; background: #e67e22; }
        .confetti:nth-child(7) { left: 70%; animation-delay: 3s; background: #1abc9c; }
        .confetti:nth-child(8) { left: 80%; animation-delay: 3.5s; background: #e91e63; }
        .confetti:nth-child(9) { left: 90%; animation-delay: 4s; background: #795548; }
        
        @keyframes confetti-fall {
            0% {
                transform: translateY(-100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .leaderboard-card {
                padding: 30px 25px;
                border-radius: 20px;
            }
            
            .header h1 {
                font-size: 2.2em;
            }
            
            table {
                font-size: 0.9rem;
            }
            
            th, td {
                padding: 0.8rem 0.5rem;
            }
            
            .action-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .action-btn {
                width: 100%;
                max-width: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- Confetti Animation for Top Performers -->
    <div th:if="${scores != null and !scores.empty and scores[0].percentage >= 85}" class="confetti-container">
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
        <div class="confetti"></div>
    </div>

    <div class="leaderboard-container">
        <div class="leaderboard-card">
            <div class="leaderboard-content">
                <div class="header">
                    <h1><i class="fas fa-trophy"></i> Leaderboard</h1>
                    <h2><i class="fas fa-chart-bar"></i> Top Performers (Highest to Lowest)</h2>
                </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> Rank</th>
                            <th><i class="fas fa-user"></i> Username</th>
                            <th><i class="fas fa-check-circle"></i> Score</th>
                            <th><i class="fas fa-list-ol"></i> Total Questions</th>
                            <th><i class="fas fa-percentage"></i> Percentage</th>
                            <th><i class="fas fa-calendar-alt"></i> Exam Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="score, iterStat : ${scores}" 
                            th:class="${iterStat.index == 0} ? 'rank-1' : (${iterStat.index == 1} ? 'rank-2' : (${iterStat.index == 2} ? 'rank-3' : ''))"
                            th:style="'animation-delay: ' + ${iterStat.index * 0.1} + 's'">
                            <td class="rank-position">
                                <span th:text="${iterStat.index + 1}">1</span>
                            </td>
                            <td class="username">
                                <i class="fas fa-user-circle" 
                                   th:style="${iterStat.index == 0} ? 'color: #ffd700' : (${iterStat.index == 1} ? 'color: #c0c0c0' : (${iterStat.index == 2} ? 'color: #cd853f' : 'color: #6c757d'))"></i>
                                <strong th:text="${score.username}">john_doe</strong>
                            </td>
                            <td class="score-cell">
                                <span th:text="${score.score}">15</span>
                            </td>
                            <td th:text="${score.totalQuestions}">15</td>
                            <td>
                                <span class="percentage-badge"
                                      th:classappend="${score.percentage >= 80} ? 'percentage-high' : (${score.percentage >= 60} ? 'percentage-medium' : 'percentage-low')"
                                      th:text="${#numbers.formatDecimal(score.percentage, 1, 1)} + '%'">100.0%</span>
                            </td>
                            <td class="date-cell">
                                <i class="fas fa-clock" style="margin-right: 0.5rem; opacity: 0.7;"></i>
                                <span th:text="${#temporals.format(score.examDate, 'MMM dd, yyyy HH:mm')}">Sep 25, 2025 14:30</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div th:if="${#lists.isEmpty(scores)}" class="empty-state">
                    <i class="fas fa-chart-line"></i>
                    <p>No exam results yet. Be the first to take an exam!</p>
                    <a th:href="@{/exam}" class="action-btn">
                        <i class="fas fa-play"></i> Start Your First Exam
                    </a>
                </div>
            </div>
            
                <div class="action-buttons">
                    <a th:href="@{/}" class="action-btn btn-primary">
                        <i class="fas fa-home"></i> Back to Home
                    </a>
                    <a th:href="@{/exam}" class="action-btn btn-success">
                        <i class="fas fa-redo"></i> Take Another Exam
                    </a>
                    <a th:href="@{/logout}" class="action-btn btn-secondary">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
